[pytest]
# Keep tests fast and quiet; verbose output is opt-in via `-v`.
addopts =
    -ra
    --tb=short
    --strict-markers

# Source lives one level up so we tell pytest exactly where tests are.
testpaths = .

# Markers registered here (keeps --strict-markers from rejecting them).
markers =
    integration: uses prepared_data under prepared_data/ (may be slow)
    cnn_dependent: needs a real TrafficCNN; skipped until model.py is done
    flwr: needs the `flwr` package at import time
    torch: needs `torch` installed
    sklearn: needs `scikit-learn` installed

# Silence a few chatty third-party warnings that pollute the report.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
